<html>
<head>
    <title>My Portfolio</title>

    <style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f4f4;
    margin:0;
    padding:0;
}

nav{
    background-color:linear-gradient(145deg, #87CEEB, #ffffff);
    padding:15px;
    display:grid;
    grid-template-columns: repeat(8, auto);
    justify-content:center;
    gap:30px;
}

.nav-grid{
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 10px 0;
    background: linear-gradient(145deg, #ffffff, #87CEEB); /* white to black */
    box-shadow: 0px 2px 5px rgba(0,0,0,0.05);
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:bold;
}

nav a:hover{
    color:white;
}

.container{
    width:80%;
    margin:auto;
    padding:40px;
}

.card{
    background:linear-gradient(145deg, #ffffff, #FFD1E5);
    padding:20px;
    margin-top:20px;
    border-radius:8px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.project-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:20px;
    margin-top:20px;
}

.project-card{
    background: linear-gradient(145deg, #FFD1E5, #ffffff); /* very light red to white */
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 6px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    cursor: pointer;
}

.project-card:hover{
    transform: translateY(-8px); /* lifts card */
    box-shadow: 0px 12px 25px rgba(0,0,0,0.2);
    background: linear-gradient(145deg, #FFB7D6, #ffffff); /* slightly stronger red on hover */
    color: #000;
}

.project-card:active{
    transform: translateY(5px); /* press down effect */
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

.hero{
    background: linear-gradient(140deg, #fd7577, #00CEEb);
    color: white;
    text-align: center;
    padding: 120px 20px;
    border-radius: 10px;
}

.hero h1{
    font-size: 60px;
    margin-bottom: 20px;
}

.hero p{
    font-size: 22px;
    margin-bottom: 30px;
}

.btn{
    background-color: white;
    color: #6EC6FF;
    padding: 12px 30px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover{
    background-color: #00ADB5;
    color: white;
}
/* Cards Section */
.cards{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
    margin-top:40px;
}

.cards .card{
    background:linear-gradient(270deg, #FFD1E5, #FFFFFF);
    padding:20px;
    border-radius:10px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);

}

/* Contact Section */
.contact{
    margin-top:50px;
    text-align:center;
}

/* Navbar layout */
.nav-grid{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:-10px;
}

/* Normal button */
.nav-card{
    background: linear-gradient(145deg, #ffCEfB, #fEf6FF);
    padding: 8px 50px;
    font-size: 24px;
    border-radius: 10px;
    font-weight: bold;
    text-decoration: none;
    color: black;
    box-shadow: 0px 6px 15px rgba(0,0,0,0.1);
    transition: all 0.2s ease;
}

/* Hover effect */
.nav-card:hover{
    transform: translateY(-4px);                 /* lift on hover */
    box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
    background: linear-gradient(180deg, #ffCEfB, #f7fEEB);
    color:#08070a;
}

/* Click-down effect */
.nav-card:active{
    transform: translateY(17px);                 /* moves down on click */
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

/* Active page button */
.nav-card.active{
    background: linear-gradient(0deg, #eaddff, #f4cEef); /* page gradient */
    color: #000;
    box-shadow: 0px 0px 0px rgba(0,0,0,0.05);
    transform: translateY(10px);       /* click effect */
    border-radius: 12px 12px 0 0;      /* rounded top corners */
    border-bottom: 0px solid transparent; /* hides boundary */
}


h1{
    color:#222;
}

html {
    scroll-behavior: smooth;
}



/* Page background gradient */
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(145deg, #ffffff, #eaddff); /* white to sky blue */
}
.main-content{
    background-color: linear-gradient(145deg, #F0F4F8, #00CED1);
    padding: 50px 20px;
}

/* Footer */
.site-footer{
    margin-top: 60px;
    padding: 30px 20px;

    background: linear-gradient(145deg, #ffffff, #87CEEB, #ffffff);

    text-align: center;

    border-top: 2px solid rgba(0,0,0,0.05);
}

.footer-content h3{
    margin-bottom: 5px;
}

.footer-links{
    margin: 15px 0;
}

.footer-links a{
    margin: 0 12px;
    text-decoration: none;
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

.footer-links a:hover{
    color: #0077ff;
}

.footer-copy{
    font-size: 14px;
    opacity: 0.7;
}

.footer-links a{
    margin: 0 14px;
    text-decoration: none;
    color: black;
    font-weight: bold;
    position: relative;
    transition: all 0.3s ease;
}

/* Hover interaction */
.footer-links a:hover{
    color: #0077ff;
    transform: translateY(-3px);
}


.footer-links a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 2px;
    background: #0077ff;
    transition: width 0.3s ease;
}

.footer-links a:hover::after{
    width: 100%;
}


</style>
</head>

<body>
<nav class="nav-grid">
    <a href="/" class="nav-card {% if request.path == '/' %}active{% endif %}">Home</a>
    <a href="/about/" class="nav-card {% if request.path == '/about/' %}active{% endif %}">About</a>
    <a href="/projects/" class="nav-card {% if request.path == '/projects/' %}active{% endif %}">Projects</a>
    <a href="/contact/" class="nav-card {% if request.path == '/contact/' %}active{% endif %}">Contact</a>
</nav>

<hr>

<div class="main-content">
{% block content %}
{% endblock %}

</div>

<script>
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll(".nav-card");

window.addEventListener("scroll", () => {
    let current = "";
    sections.forEach(section => {
        const sectionTop = section.offsetTop;
        const sectionHeight = section.clientHeight;
        if(scrollY >= sectionTop - 80){ // offset for sticky navbar
            current = section.getAttribute("id");
        }
    });

    navLinks.forEach(link => {
        link.classList.remove("active");
        if(link.getAttribute("href") === "#" + current){
            link.classList.add("active");
        }
    });
});
</script>

<footer class="site-footer">
    <div class="footer-content">

        <h3>My Portfolio</h3>
        <p>Python & Django Web Developer</p>

        <div class="footer-links">
            <a href="#">🐙 GitHub</a>
            <a href="#">💼 LinkedIn</a>
            <a href="#">✉ Email</a>
        </div>

        <p class="footer-copy">
            © 2026 My Portfolio. All rights reserved.
        </p>

    </div>
</footer>


</body>
</html>
